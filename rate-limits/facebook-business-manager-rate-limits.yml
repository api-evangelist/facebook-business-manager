specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Facebook Business Manager
providerId: facebook-business-manager
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Advertising
  - Analytics
  - Business Management
  - Marketing
  - Social Media
  - Rate Limiting
description: The Business Manager API surface (Marketing, Pages, Conversions, Catalog, Insights, Messenger,
  WhatsApp Business) is bound by Meta's Graph API rate-limiting framework. Limits are formula-based (Platform
  + Business Use Case + Pages/Messenger/Instagram windows) and depend on the app's App Review tier (Development,
  Standard, Advanced).
sources:
  - https://developers.facebook.com/docs/graph-api/overview/rate-limiting
  - https://developers.facebook.com/docs/marketing-api/overview/authorization
headers:
  appUsage: X-App-Usage
  businessUseCaseUsage: X-Business-Use-Case-Usage
  adAccountUsage: X-Ad-Account-Usage
  pageUsage: X-Page-Usage
responseCodes:
  appLimitReached: 4
  userLimitReached: 17
  pagesLimitReached: 32
  customRateLimit: 613
  throttled: 429
limits:
  - name: App-level (Platform)
    scope: app
    metric: calls_per_hour
    limit: 'Calls within one hour = 200 * Number of Users'
    notes: Number of Users = unique daily active users for the app.
  - name: Ads Management — Standard Access (BUC)
    scope: business
    metric: calls_per_hour
    limit: 'Calls within one hour = 300 + 40 * Number of Active ads'
  - name: Ads Management — Advanced Access (BUC)
    scope: business
    metric: calls_per_hour
    limit: 'Calls within one hour = 100000 + 40 * Number of Active ads'
  - name: Ads Insights — Standard Access (BUC)
    scope: business
    metric: calls_per_hour
    limit: 'Calls within one hour = 600 + 400 * Number of Active ads - 0.001 * User Errors'
  - name: Ads Insights — Advanced Access (BUC)
    scope: business
    metric: calls_per_hour
    limit: 'Calls within one hour = 190000 + 400 * Number of Active ads'
  - name: Custom Audience — Standard Access (BUC)
    scope: business
    metric: calls_per_hour
    limit: 'Calls within one hour = 5000 + 40 * Number of Active Custom Audiences (capped at 700,000)'
  - name: Custom Audience — Advanced Access (BUC)
    scope: business
    metric: calls_per_hour
    limit: 'Calls within one hour = 190000 + 40 * Number of Active Custom Audiences'
  - name: Pages API
    scope: page
    metric: calls_per_24h
    limit: 'Calls within 24 hours = 4800 * Number of Engaged Users'
  - name: Messenger Platform
    scope: page
    metric: calls_per_24h
    limit: 'Calls within 24 hours = 200 * Number of Engaged Users'
  - name: Instagram Platform
    scope: account
    metric: calls_per_24h
    limit: 'Calls within 24 hours = 4800 * Number of Impressions'
  - name: Lead Ads (LeadGen)
    scope: business
    metric: calls_per_24h
    limit: 'Calls within 24 hours = 4800 * Leads Generated'
policies:
  - name: Tiered access via App Review
    description: New apps default to Development Access. Standard/Advanced ceilings unlock after Business
      Verification + App Review for the corresponding feature.
  - name: Header-based observability
    description: Read X-App-Usage, X-Business-Use-Case-Usage, X-Ad-Account-Usage, X-Page-Usage; throttling
      kicks in at 100% of call_count, total_cputime, or total_time.
  - name: Backoff on throttle
    description: Honor estimated_time_to_regain_access from X-Business-Use-Case-Usage; otherwise exponential
      backoff with jitter.
  - name: Error-code dispatch
    description: 'Code 4 (app), 17 (user), 32 (page), 613 (custom). BUC-specific: 80001-80014.'
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
