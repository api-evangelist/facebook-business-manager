specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Facebook Business Manager
providerId: facebook-business-manager
publisherName: Meta Platforms, Inc.
serviceCategory: Advertising / Business Management
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Advertising
  - Analytics
  - Business Management
  - Marketing
  - Social Media
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps for Meta Business Manager (now Meta Business Suite): the API surface
  is free; spend lands as Meta Ads campaign cost (CPM/CPC/CPA) and per-conversation WhatsApp Business
  pricing. API-level FinOps focuses on App Review tier and BUC quota burn.'
sources:
  - https://developers.facebook.com/docs/graph-api/overview/rate-limiting
  - https://www.facebook.com/business/ads/pricing
  - https://developers.facebook.com/docs/whatsapp/pricing
principles:
  - name: Visibility
    description: Read X-App-Usage, X-Business-Use-Case-Usage, X-Ad-Account-Usage, X-Page-Usage on every
      response; pull Ads Manager spend reports daily; export WhatsApp conversation logs.
  - name: Allocation
    description: Allocate ad spend by ad account → campaign → ad set → ad; allocate WhatsApp spend by
      WABA ID, category, and country. Tag each Conversions API event with the originating product/team.
  - name: Optimization
    description: Batch Marketing/Insights calls (use ?fields= and the batch endpoint); reduce User Errors
      that erode the Standard Access Ads Insights ceiling; route WhatsApp conversation traffic into the
      24h customer-service window where free service conversations apply.
  - name: Accountability
    description: Per-app owners own the App Review tier; per-ad-account owners own ad spend; per-WABA
      owners own conversation cost. Reconcile Meta Ads invoices and WhatsApp reports monthly against
      finance ledgers.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - Invoicing and Chargeback
billingModel:
  pricingCategory: Free API + Downstream Ad Spend + Per-Conversation Messaging
  billingFrequency: Monthly
  billingCurrency: USD (settlement varies by country)
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Meta Business Manager / Business Suite
  ServiceCategory: Advertising / Business Management
  ProviderName: Meta
  PublisherName: Meta Platforms, Inc.
  InvoiceIssuerName: Meta Platforms, Inc.
  PricingCategory: Free API + Usage (downstream)
  PricingUnit: varies (impression, conversation, ad-spend USD)
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: graph_api_calls
    description: Count of Marketing/Pages/Conversions/Catalog Graph API calls; not directly billed but
      governs rate-limit burn.
    unit: call
    aggregation: sum
    dimensions:
      - app
      - business_id
      - ad_account
      - endpoint
  - name: ad_spend
    description: Meta Ads campaign spend.
    unit: USD
    aggregation: sum
    dimensions:
      - ad_account
      - campaign
      - placement
      - country
  - name: whatsapp_conversations
    description: 24-hour WhatsApp Business conversations.
    unit: conversation
    aggregation: sum
    dimensions:
      - waba_id
      - category
      - country
  - name: conversion_events
    description: Conversions API events ingested.
    unit: event
    aggregation: sum
    dimensions:
      - pixel_id
      - event_name
apis:
  - name: Facebook Marketing API
    baseURL: https://graph.facebook.com/v18.0
    serviceName: Facebook Marketing API
    serviceCategory: API
  - name: Facebook Pages API
    baseURL: https://graph.facebook.com/v18.0
    serviceName: Facebook Pages API
    serviceCategory: API
  - name: Facebook Conversions API
    baseURL: https://graph.facebook.com/v18.0
    serviceName: Facebook Conversions API
    serviceCategory: API
  - name: Facebook Business Asset API
    baseURL: https://graph.facebook.com/v18.0
    serviceName: Facebook Business Asset API
    serviceCategory: API
  - name: Facebook Insights API
    baseURL: https://graph.facebook.com/v25.0
    serviceName: Facebook Insights API
    serviceCategory: API
  - name: Facebook Catalog API
    baseURL: https://graph.facebook.com/v25.0
    serviceName: Facebook Catalog API
    serviceCategory: API
  - name: Facebook WhatsApp Business Platform API
    baseURL: https://graph.facebook.com/v25.0
    serviceName: Facebook WhatsApp Business Platform API
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Impressions (CPM)
    metric: ad_spend / (impressions / 1000)
    target: campaign-dependent
  - name: Cost per WhatsApp Conversation
    metric: whatsapp_spend / whatsapp_conversations
    target: see WhatsApp Business pricing by country
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
