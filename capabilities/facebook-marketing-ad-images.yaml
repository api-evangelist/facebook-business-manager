naftiko: 1.0.0-alpha2
info:
  label: Facebook Business Manager Facebook Marketing API — Ad Images
  description: 'Facebook Business Manager Facebook Marketing API — Ad Images. 1 operations. Lead operation: Facebook Business
    Manager Upload an ad image. Self-contained Naftiko capability covering one Facebook Business Manager business surface.'
  tags:
  - Facebook Business Manager
  - Ad Images
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACEBOOK_BUSINESS_MANAGER_API_KEY: FACEBOOK_BUSINESS_MANAGER_API_KEY
capability:
  consumes:
  - type: http
    namespace: facebook-marketing-ad-images
    baseUri: https://graph.facebook.com/v25.0
    description: Facebook Business Manager Facebook Marketing API — Ad Images business capability. Self-contained, no shared
      references.
    resources:
    - name: act_{ad_account_id}-adimages
      path: /act_{ad_account_id}/adimages
      operations:
      - name: uploadadimage
        method: POST
        description: Facebook Business Manager Upload an ad image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FACEBOOK_BUSINESS_MANAGER_API_KEY}}'
  exposes:
  - type: rest
    namespace: facebook-marketing-ad-images-rest
    port: 8080
    description: REST adapter for Facebook Business Manager Facebook Marketing API — Ad Images. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/act-ad-account-id/adimages
      name: act-ad-account-id-adimages
      description: REST surface for act_{ad_account_id}-adimages.
      operations:
      - method: POST
        name: uploadadimage
        description: Facebook Business Manager Upload an ad image
        call: facebook-marketing-ad-images.uploadadimage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: facebook-marketing-ad-images-mcp
    port: 9090
    transport: http
    description: MCP adapter for Facebook Business Manager Facebook Marketing API — Ad Images. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: facebook-business-manager-upload-ad
      description: Facebook Business Manager Upload an ad image
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: facebook-marketing-ad-images.uploadadimage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
