naftiko: 1.0.0-alpha2
info:
  label: Facebook Business Manager Facebook Pages API — Pages
  description: 'Facebook Business Manager Facebook Pages API — Pages. 2 operations. Lead operation: Facebook Business Manager
    Get page details. Self-contained Naftiko capability covering one Facebook Business Manager business surface.'
  tags:
  - Facebook Business Manager
  - Pages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACEBOOK_BUSINESS_MANAGER_API_KEY: FACEBOOK_BUSINESS_MANAGER_API_KEY
capability:
  consumes:
  - type: http
    namespace: facebook-pages-pages
    baseUri: https://graph.facebook.com/v25.0
    description: Facebook Business Manager Facebook Pages API — Pages business capability. Self-contained, no shared references.
    resources:
    - name: page_id
      path: /{page_id}
      operations:
      - name: getpage
        method: GET
        description: Facebook Business Manager Get page details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: page_id-subscribed_apps
      path: /{page_id}/subscribed_apps
      operations:
      - name: subscribepageapp
        method: POST
        description: Facebook Business Manager Subscribe app to page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FACEBOOK_BUSINESS_MANAGER_API_KEY}}'
  exposes:
  - type: rest
    namespace: facebook-pages-pages-rest
    port: 8080
    description: REST adapter for Facebook Business Manager Facebook Pages API — Pages. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/{page-id}
      name: page-id
      description: REST surface for page_id.
      operations:
      - method: GET
        name: getpage
        description: Facebook Business Manager Get page details
        call: facebook-pages-pages.getpage
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{page-id}/subscribed-apps
      name: page-id-subscribed-apps
      description: REST surface for page_id-subscribed_apps.
      operations:
      - method: POST
        name: subscribepageapp
        description: Facebook Business Manager Subscribe app to page
        call: facebook-pages-pages.subscribepageapp
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: facebook-pages-pages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Facebook Business Manager Facebook Pages API — Pages. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: facebook-business-manager-get-page
      description: Facebook Business Manager Get page details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: facebook-pages-pages.getpage
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-business-manager-subscribe-app
      description: Facebook Business Manager Subscribe app to page
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: facebook-pages-pages.subscribepageapp
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
