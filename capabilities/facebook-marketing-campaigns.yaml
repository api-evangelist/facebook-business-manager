naftiko: 1.0.0-alpha2
info:
  label: Facebook Business Manager Facebook Marketing API — Campaigns
  description: 'Facebook Business Manager Facebook Marketing API — Campaigns. 5 operations. Lead operation: Facebook Business
    Manager List campaigns. Self-contained Naftiko capability covering one Facebook Business Manager business surface.'
  tags:
  - Facebook Business Manager
  - Campaigns
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACEBOOK_BUSINESS_MANAGER_API_KEY: FACEBOOK_BUSINESS_MANAGER_API_KEY
capability:
  consumes:
  - type: http
    namespace: facebook-marketing-campaigns
    baseUri: https://graph.facebook.com/v25.0
    description: Facebook Business Manager Facebook Marketing API — Campaigns business capability. Self-contained, no shared
      references.
    resources:
    - name: act_{ad_account_id}-campaigns
      path: /act_{ad_account_id}/campaigns
      operations:
      - name: listcampaigns
        method: GET
        description: Facebook Business Manager List campaigns
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filtering
          in: query
          type: string
          description: Filters to apply to the campaign list. Accepts JSON array of filter objects with field, operator, and
            value.
      - name: createcampaign
        method: POST
        description: Facebook Business Manager Create a campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: campaign_id
      path: /{campaign_id}
      operations:
      - name: getcampaign
        method: GET
        description: Facebook Business Manager Get a campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatecampaign
        method: POST
        description: Facebook Business Manager Update a campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletecampaign
        method: DELETE
        description: Facebook Business Manager Delete a campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FACEBOOK_BUSINESS_MANAGER_API_KEY}}'
  exposes:
  - type: rest
    namespace: facebook-marketing-campaigns-rest
    port: 8080
    description: REST adapter for Facebook Business Manager Facebook Marketing API — Campaigns. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/act-ad-account-id/campaigns
      name: act-ad-account-id-campaigns
      description: REST surface for act_{ad_account_id}-campaigns.
      operations:
      - method: GET
        name: listcampaigns
        description: Facebook Business Manager List campaigns
        call: facebook-marketing-campaigns.listcampaigns
        with:
          filtering: rest.filtering
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcampaign
        description: Facebook Business Manager Create a campaign
        call: facebook-marketing-campaigns.createcampaign
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{campaign-id}
      name: campaign-id
      description: REST surface for campaign_id.
      operations:
      - method: GET
        name: getcampaign
        description: Facebook Business Manager Get a campaign
        call: facebook-marketing-campaigns.getcampaign
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updatecampaign
        description: Facebook Business Manager Update a campaign
        call: facebook-marketing-campaigns.updatecampaign
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecampaign
        description: Facebook Business Manager Delete a campaign
        call: facebook-marketing-campaigns.deletecampaign
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: facebook-marketing-campaigns-mcp
    port: 9090
    transport: http
    description: MCP adapter for Facebook Business Manager Facebook Marketing API — Campaigns. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: facebook-business-manager-list-campaigns
      description: Facebook Business Manager List campaigns
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: facebook-marketing-campaigns.listcampaigns
      with:
        filtering: tools.filtering
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-business-manager-create-campaign
      description: Facebook Business Manager Create a campaign
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: facebook-marketing-campaigns.createcampaign
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-business-manager-get-campaign
      description: Facebook Business Manager Get a campaign
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: facebook-marketing-campaigns.getcampaign
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-business-manager-update-campaign
      description: Facebook Business Manager Update a campaign
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: facebook-marketing-campaigns.updatecampaign
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-business-manager-delete-campaign
      description: Facebook Business Manager Delete a campaign
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: facebook-marketing-campaigns.deletecampaign
      outputParameters:
      - type: object
        mapping: $.
