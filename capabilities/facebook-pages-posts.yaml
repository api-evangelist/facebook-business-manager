naftiko: 1.0.0-alpha2
info:
  label: Facebook Business Manager Facebook Pages API — Posts
  description: 'Facebook Business Manager Facebook Pages API — Posts. 5 operations. Lead operation: Facebook Business Manager
    Get page feed. Self-contained Naftiko capability covering one Facebook Business Manager business surface.'
  tags:
  - Facebook Business Manager
  - Posts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACEBOOK_BUSINESS_MANAGER_API_KEY: FACEBOOK_BUSINESS_MANAGER_API_KEY
capability:
  consumes:
  - type: http
    namespace: facebook-pages-posts
    baseUri: https://graph.facebook.com/v25.0
    description: Facebook Business Manager Facebook Pages API — Posts business capability. Self-contained, no shared references.
    resources:
    - name: page_id-feed
      path: /{page_id}/feed
      operations:
      - name: getpagefeed
        method: GET
        description: Facebook Business Manager Get page feed
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createpagepost
        method: POST
        description: Facebook Business Manager Create a page post
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: post_id
      path: /{post_id}
      operations:
      - name: getpost
        method: GET
        description: Facebook Business Manager Get a post
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatepost
        method: POST
        description: Facebook Business Manager Update a post
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletepost
        method: DELETE
        description: Facebook Business Manager Delete a post
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FACEBOOK_BUSINESS_MANAGER_API_KEY}}'
  exposes:
  - type: rest
    namespace: facebook-pages-posts-rest
    port: 8080
    description: REST adapter for Facebook Business Manager Facebook Pages API — Posts. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/{page-id}/feed
      name: page-id-feed
      description: REST surface for page_id-feed.
      operations:
      - method: GET
        name: getpagefeed
        description: Facebook Business Manager Get page feed
        call: facebook-pages-posts.getpagefeed
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createpagepost
        description: Facebook Business Manager Create a page post
        call: facebook-pages-posts.createpagepost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{post-id}
      name: post-id
      description: REST surface for post_id.
      operations:
      - method: GET
        name: getpost
        description: Facebook Business Manager Get a post
        call: facebook-pages-posts.getpost
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updatepost
        description: Facebook Business Manager Update a post
        call: facebook-pages-posts.updatepost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletepost
        description: Facebook Business Manager Delete a post
        call: facebook-pages-posts.deletepost
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: facebook-pages-posts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Facebook Business Manager Facebook Pages API — Posts. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: facebook-business-manager-get-page
      description: Facebook Business Manager Get page feed
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: facebook-pages-posts.getpagefeed
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-business-manager-create-page
      description: Facebook Business Manager Create a page post
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: facebook-pages-posts.createpagepost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-business-manager-get-post
      description: Facebook Business Manager Get a post
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: facebook-pages-posts.getpost
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-business-manager-update-post
      description: Facebook Business Manager Update a post
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: facebook-pages-posts.updatepost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-business-manager-delete-post
      description: Facebook Business Manager Delete a post
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: facebook-pages-posts.deletepost
      outputParameters:
      - type: object
        mapping: $.
