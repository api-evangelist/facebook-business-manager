naftiko: 1.0.0-alpha2
info:
  label: Facebook Business Manager Facebook Marketing API — Ad Creatives
  description: 'Facebook Business Manager Facebook Marketing API — Ad Creatives. 2 operations. Lead operation: Facebook Business
    Manager List ad creatives. Self-contained Naftiko capability covering one Facebook Business Manager business surface.'
  tags:
  - Facebook Business Manager
  - Ad Creatives
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACEBOOK_BUSINESS_MANAGER_API_KEY: FACEBOOK_BUSINESS_MANAGER_API_KEY
capability:
  consumes:
  - type: http
    namespace: facebook-marketing-ad-creatives
    baseUri: https://graph.facebook.com/v25.0
    description: Facebook Business Manager Facebook Marketing API — Ad Creatives business capability. Self-contained, no shared
      references.
    resources:
    - name: act_{ad_account_id}-adcreatives
      path: /act_{ad_account_id}/adcreatives
      operations:
      - name: listadcreatives
        method: GET
        description: Facebook Business Manager List ad creatives
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createadcreative
        method: POST
        description: Facebook Business Manager Create an ad creative
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FACEBOOK_BUSINESS_MANAGER_API_KEY}}'
  exposes:
  - type: rest
    namespace: facebook-marketing-ad-creatives-rest
    port: 8080
    description: REST adapter for Facebook Business Manager Facebook Marketing API — Ad Creatives. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/act-ad-account-id/adcreatives
      name: act-ad-account-id-adcreatives
      description: REST surface for act_{ad_account_id}-adcreatives.
      operations:
      - method: GET
        name: listadcreatives
        description: Facebook Business Manager List ad creatives
        call: facebook-marketing-ad-creatives.listadcreatives
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createadcreative
        description: Facebook Business Manager Create an ad creative
        call: facebook-marketing-ad-creatives.createadcreative
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: facebook-marketing-ad-creatives-mcp
    port: 9090
    transport: http
    description: MCP adapter for Facebook Business Manager Facebook Marketing API — Ad Creatives. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: facebook-business-manager-list-ad
      description: Facebook Business Manager List ad creatives
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: facebook-marketing-ad-creatives.listadcreatives
      outputParameters:
      - type: object
        mapping: $.
    - name: facebook-business-manager-create-ad
      description: Facebook Business Manager Create an ad creative
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: facebook-marketing-ad-creatives.createadcreative
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
