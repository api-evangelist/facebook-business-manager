naftiko: 1.0.0-alpha2
info:
  label: Facebook Business Manager Facebook Pages API — Videos
  description: 'Facebook Business Manager Facebook Pages API — Videos. 1 operations. Lead operation: Facebook Business Manager
    Upload a page video. Self-contained Naftiko capability covering one Facebook Business Manager business surface.'
  tags:
  - Facebook Business Manager
  - Videos
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACEBOOK_BUSINESS_MANAGER_API_KEY: FACEBOOK_BUSINESS_MANAGER_API_KEY
capability:
  consumes:
  - type: http
    namespace: facebook-pages-videos
    baseUri: https://graph.facebook.com/v25.0
    description: Facebook Business Manager Facebook Pages API — Videos business capability. Self-contained, no shared references.
    resources:
    - name: page_id-videos
      path: /{page_id}/videos
      operations:
      - name: uploadpagevideo
        method: POST
        description: Facebook Business Manager Upload a page video
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FACEBOOK_BUSINESS_MANAGER_API_KEY}}'
  exposes:
  - type: rest
    namespace: facebook-pages-videos-rest
    port: 8080
    description: REST adapter for Facebook Business Manager Facebook Pages API — Videos. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/{page-id}/videos
      name: page-id-videos
      description: REST surface for page_id-videos.
      operations:
      - method: POST
        name: uploadpagevideo
        description: Facebook Business Manager Upload a page video
        call: facebook-pages-videos.uploadpagevideo
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: facebook-pages-videos-mcp
    port: 9090
    transport: http
    description: MCP adapter for Facebook Business Manager Facebook Pages API — Videos. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: facebook-business-manager-upload-page
      description: Facebook Business Manager Upload a page video
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: facebook-pages-videos.uploadpagevideo
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
