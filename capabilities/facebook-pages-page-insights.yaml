naftiko: 1.0.0-alpha2
info:
  label: Facebook Business Manager Facebook Pages API — Page Insights
  description: 'Facebook Business Manager Facebook Pages API — Page Insights. 1 operations. Lead operation: Facebook Business
    Manager Get page insights. Self-contained Naftiko capability covering one Facebook Business Manager business surface.'
  tags:
  - Facebook Business Manager
  - Page Insights
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FACEBOOK_BUSINESS_MANAGER_API_KEY: FACEBOOK_BUSINESS_MANAGER_API_KEY
capability:
  consumes:
  - type: http
    namespace: facebook-pages-page-insights
    baseUri: https://graph.facebook.com/v25.0
    description: Facebook Business Manager Facebook Pages API — Page Insights business capability. Self-contained, no shared
      references.
    resources:
    - name: page_id-insights
      path: /{page_id}/insights
      operations:
      - name: getpageinsights
        method: GET
        description: Facebook Business Manager Get page insights
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: metric
          in: query
          type: string
          description: Comma-separated list of metrics to retrieve such as page_impressions, page_engaged_users, page_fans.
          required: true
        - name: period
          in: query
          type: string
          description: Aggregation period for the metrics
        - name: since
          in: query
          type: string
          description: Start of the date range in Unix timestamp or YYYY-MM-DD format
        - name: until
          in: query
          type: string
          description: End of the date range in Unix timestamp or YYYY-MM-DD format
    authentication:
      type: bearer
      token: '{{env.FACEBOOK_BUSINESS_MANAGER_API_KEY}}'
  exposes:
  - type: rest
    namespace: facebook-pages-page-insights-rest
    port: 8080
    description: REST adapter for Facebook Business Manager Facebook Pages API — Page Insights. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/{page-id}/insights
      name: page-id-insights
      description: REST surface for page_id-insights.
      operations:
      - method: GET
        name: getpageinsights
        description: Facebook Business Manager Get page insights
        call: facebook-pages-page-insights.getpageinsights
        with:
          metric: rest.metric
          period: rest.period
          since: rest.since
          until: rest.until
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: facebook-pages-page-insights-mcp
    port: 9090
    transport: http
    description: MCP adapter for Facebook Business Manager Facebook Pages API — Page Insights. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: facebook-business-manager-get-page
      description: Facebook Business Manager Get page insights
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: facebook-pages-page-insights.getpageinsights
      with:
        metric: tools.metric
        period: tools.period
        since: tools.since
        until: tools.until
      outputParameters:
      - type: object
        mapping: $.
